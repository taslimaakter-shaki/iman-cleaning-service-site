    <script>
      (() => {
        const addOns = Array.from(document.querySelectorAll("[data-addon-option]"));
        if (!addOns.length) return;
        const windowAddOn = addOns.find((input) => input.value === "Interior windows");
        const windowCount = document.querySelector("[data-window-count]");
        const windowCountField = document.querySelector("[data-window-count-field]");
        const additionalAreasSelect = document.querySelector("[data-additional-areas-select]");
        const additionalAreasField = document.querySelector("[data-additional-areas-field]");
        const additionalAreasInput = document.querySelector("[data-additional-areas-input]");
        const serviceType = document.querySelector('[name="Service Type"]');
        const cleaningDetailFields = Array.from(document.querySelectorAll("[data-cleaning-detail-field]"));
        const organizingFields = Array.from(document.querySelectorAll("[data-organizing-hours-field], [data-organizing-team-field]"));
        const detailedCleaningFields = Array.from(document.querySelectorAll("[data-detailed-hours-field], [data-detailed-team-field]"));

        function shouldShowCleaningDetails() {
          return serviceType && serviceType.value && !["Organizing", "Detailed Cleaning"].includes(serviceType.value);
        }

        function shouldShowOrganizingFields() {
          return serviceType && serviceType.value === "Organizing";
        }

        function shouldShowDetailedCleaningFields() {
          return serviceType && serviceType.value === "Detailed Cleaning";
        }

        function syncFieldAvailability(field, isAvailable) {
          field.hidden = !isAvailable;
          field.querySelectorAll("input, select, textarea").forEach((control) => {
            if (!control.dataset.initialRequired) {
              control.dataset.initialRequired = control.required ? "true" : "false";
            }
            control.disabled = !isAvailable;
            control.required = isAvailable && control.dataset.initialRequired === "true";
          });
        }

        function syncCleaningDetailFields() {
          const showDetails = shouldShowCleaningDetails();
          cleaningDetailFields.forEach((field) => {
            syncFieldAvailability(field, showDetails);
          });
          organizingFields.forEach((field) => {
            syncFieldAvailability(field, shouldShowOrganizingFields());
          });
          detailedCleaningFields.forEach((field) => {
            syncFieldAvailability(field, shouldShowDetailedCleaningFields());
          });
          if (!showDetails && additionalAreasInput) {
            additionalAreasInput.value = "";
          }
          syncAdditionalAreas();
          syncAddOnRequirement();
          syncWindowCount();
        }

        function syncAddOnRequirement() {
          if (!shouldShowCleaningDetails()) {
            addOns.forEach((input) => {
              input.required = false;
            });
            return;
          }
          const hasSelection = addOns.some((input) => input.checked);
          addOns.forEach((input, index) => {
            input.required = index === 0 && !hasSelection;
          });
        }

        function syncWindowCount() {
          if (!windowAddOn || !windowCount) return;
          const needsWindowCount = windowAddOn.checked;
          if (windowCountField) {
            windowCountField.hidden = !needsWindowCount;
          }
          windowCount.disabled = !needsWindowCount;
          windowCount.required = needsWindowCount;
          if (!needsWindowCount) {
            windowCount.value = "";
          }
        }

        function syncNoAddOns(input) {
          const noAddOns = addOns.find((option) => option.value === "No add-ons needed");
          if (!noAddOns || !input.checked) return;
          if (input === noAddOns) {
            addOns.forEach((option) => {
              if (option !== noAddOns) option.checked = false;
            });
          } else {
            noAddOns.checked = false;
          }
        }

        function syncAdditionalAreas() {
          if (!additionalAreasSelect || !additionalAreasInput) return;
          const needsDetails = shouldShowCleaningDetails() && additionalAreasSelect.value === "Yes";
          if (additionalAreasField) {
            additionalAreasField.hidden = !needsDetails;
          }
          additionalAreasInput.disabled = !needsDetails;
          additionalAreasInput.required = needsDetails;
          if (!needsDetails) {
            additionalAreasInput.value = "";
          }
        }

        addOns.forEach((input) => {
          input.addEventListener("change", () => {
            syncNoAddOns(input);
            syncAddOnRequirement();
            syncWindowCount();
          });
        });
        if (additionalAreasSelect) {
          additionalAreasSelect.addEventListener("change", syncAdditionalAreas);
        }
        if (serviceType) {
          serviceType.addEventListener("change", syncCleaningDetailFields);
        }
        syncCleaningDetailFields();
      })();
    </script>
  </body>
