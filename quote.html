    <script>
      (() => {
        const addOns = Array.from(document.querySelectorAll("[data-addon-option]"));
        if (!addOns.length) return;
        const windowAddOn = addOns.find((input) => input.value === "Interior windows");
        const windowCount = document.querySelector("[data-window-count]");
        const windowCountField = document.querySelector("[data-window-count-field]");

        function syncAddOnRequirement() {
          const hasSelection = addOns.some((input) => input.checked);
          addOns.forEach((input, index) => {
            input.required = index === 0 && !hasSelection;
          });
        }

        function syncWindowCount() {
          if (!windowAddOn || !windowCount) return;
          const needsWindowCount = windowAddOn.checked;
          if (windowCountField) {
            windowCountField.hidden = !needsWindowCount;
          }
          windowCount.disabled = !needsWindowCount;
          windowCount.required = needsWindowCount;
          if (!needsWindowCount) {
            windowCount.value = "";
          }
        }

        addOns.forEach((input) => {
          input.addEventListener("change", () => {
            syncAddOnRequirement();
            syncWindowCount();
          });
        });
        syncAddOnRequirement();
        syncWindowCount();
      })();
    </script>
